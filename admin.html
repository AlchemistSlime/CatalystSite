<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalyst Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyber: { purple: '#a855f7', dark: '#0f0b1e', darker: '#07040f', neon: '#d946ef', pink: '#ec4899' },
          },
        },
      },
    };
  </script>
  <style>
    body { background: #07040f; }
    .gradient-text { background: linear-gradient(135deg, #d946ef, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tab-btn.active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #07040f; } ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #a855f7, #7c3aed); border-radius: 3px; }
  </style>
</head>
<body class="text-white font-sans min-h-screen p-6">
  <div class="max-w-6xl mx-auto">

    <!-- Заголовок + авторизация -->
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-bold gradient-text">Catalyst Admin Panel</h1>
        <p class="text-purple-400/50 text-sm mt-1">Games · Loader · Logs</p>
      </div>
      <div class="flex gap-3">
        <input id="passwordInput" type="password" placeholder="Password" class="bg-cyber-dark border border-purple-900/50 rounded-lg px-4 py-2 text-white placeholder-purple-400/50 focus:outline-none focus:border-purple-500 w-44" />
        <button id="authBtn" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-lg font-semibold transition">Log In</button>
      </div>
    </div>

    <div id="authStatus" class="mb-6 text-sm"></div>

    <!-- Основной контент (скрыт до авторизации) -->
    <div id="mainContent" class="hidden">

      <!-- Табы -->
      <div class="flex gap-2 mb-8 flex-wrap border-b border-purple-900/30 pb-4">
        <button class="tab-btn active px-5 py-2 rounded-lg text-sm font-medium border border-transparent transition" data-tab="tab-games">Games</button>
        <button class="tab-btn px-5 py-2 rounded-lg text-sm font-medium border border-transparent transition" data-tab="tab-loader">Universal Loader</button>
        <button class="tab-btn px-5 py-2 rounded-lg text-sm font-medium border border-transparent transition" data-tab="tab-logs">Launch Logs</button>
      </div>

      <!-- Таб: Games -->
      <div id="tab-games" class="tab-content active">
        <!-- Добавление игры -->
        <div class="bg-cyber-dark border border-purple-900/30 rounded-2xl p-6 mb-6">
          <h2 class="text-xl font-bold mb-4">Add New Game</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <input id="newGameId" placeholder="PlaceId (e.g. 142823291)" class="bg-cyber-darker border border-purple-900/50 rounded-lg px-4 py-2 text-sm" />
            <input id="newGameName" placeholder="Game Name (e.g. MM2)" class="bg-cyber-darker border border-purple-900/50 rounded-lg px-4 py-2 text-sm" />
            <select id="newGameStatus" class="bg-cyber-darker border border-purple-900/50 rounded-lg px-4 py-2 text-sm">
              <option value="Undetected">Undetected</option>
              <option value="On Update">On Update</option>
              <option value="Patched">Patched</option>
            </select>
          </div>
          <button id="addGameBtn" class="bg-green-600 hover:bg-green-700 px-5 py-2 rounded-lg text-sm font-semibold transition">Add Game</button>
        </div>

        <!-- Список игр -->
        <div class="bg-cyber-dark border border-purple-900/30 rounded-2xl p-6">
          <h2 class="text-xl font-bold mb-4">Manage Games</h2>
          <div id="gamesList" class="space-y-4"></div>
        </div>
      </div>

      <!-- Таб: Universal Loader -->
      <div id="tab-loader" class="tab-content">
        <div class="bg-cyber-dark border border-purple-900/30 rounded-2xl p-6">
          <h2 class="text-xl font-bold mb-4">Universal Loader Script</h2>
          <p class="text-purple-300/60 text-sm mb-2">This Lua script is sent to users.</p>
          <p class="text-purple-400/50 text-xs mb-4">Users execute: <code class="text-green-400">loadstring(game:HttpGet("https://catalyst-sites.vercel.app/api/admin?action=loader"))()</code></p>
          <textarea id="loaderCode" rows="20" class="w-full bg-cyber-darker border border-purple-900/50 rounded-lg px-4 py-3 text-green-400 font-mono text-sm focus:outline-none focus:border-purple-500 mb-4 resize-y"></textarea>
          <div class="flex gap-4 mb-4">
            <button id="loadLoaderBtn" class="bg-cyber-darker border border-purple-900/50 hover:border-purple-500 px-5 py-2 rounded-lg text-sm transition">Load Current</button>
            <button id="updateLoaderBtn" class="bg-purple-600 hover:bg-purple-700 px-5 py-2 rounded-lg text-sm font-semibold transition">Update Loader</button>
          </div>
          <div id="loaderStatus" class="text-sm"></div>
        </div>
      </div>

      <!-- Таб: Launch Logs -->
      <div id="tab-logs" class="tab-content">
        <div class="bg-cyber-dark border border-purple-900/30 rounded-2xl p-6">
          <h2 class="text-xl font-bold mb-4">Launch Logs</h2>
          <button id="refreshLogsBtn" class="bg-cyber-darker border border-purple-900/50 hover:border-purple-500 px-4 py-2 rounded-lg text-sm mb-4 transition">Refresh</button>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead><tr class="border-b border-purple-900/30 text-purple-300"><th class="py-3 px-4">Timestamp</th><th class="py-3 px-4">IP</th><th class="py-3 px-4">Game</th><th class="py-3 px-4">Name</th></tr></thead>
              <tbody id="logsBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let authPassword = '';
    const savedPass = sessionStorage.getItem('admin_pass');
    if (savedPass) { document.getElementById('passwordInput').value = savedPass; authenticate(savedPass); }

    document.getElementById('authBtn').addEventListener('click', () => {
      const pass = document.getElementById('passwordInput').value;
      if (!pass) return alert('Enter password');
      sessionStorage.setItem('admin_pass', pass);
      authenticate(pass);
    });

    async function authenticate(pass) {
      authPassword = pass;
      const res = await fetch(`/api/admin?action=logs&password=${encodeURIComponent(pass)}`);
      if (res.status === 401) {
        document.getElementById('authStatus').innerHTML = '<span class="text-red-400">Invalid password</span>';
        document.getElementById('mainContent').classList.add('hidden');
        return;
      }
      document.getElementById('authStatus').innerHTML = '<span class="text-green-400">Authenticated</span>';
      document.getElementById('mainContent').classList.remove('hidden');
      loadAllData();
    }

    async function apiGet(action, params = '') {
      const res = await fetch(`/api/admin?action=${action}&password=${encodeURIComponent(authPassword)}${params}`);
      return res.json();
    }

    async function apiPost(body) {
      const res = await fetch('/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...body, password: authPassword }),
      });
      return res.json();
    }

    async function loadAllData() {
      const games = await apiGet('getGames');
      renderGamesList(games.games || {});

      const loaderRes = await fetch(`/api/admin?action=loader&password=${encodeURIComponent(authPassword)}`);
      // loader возвращает скрипт, но для админа не нужен Roblox UA, поэтому мы добавим обходной путь: запросим как админ
      // Но action=loader проверяет UA. Чтобы админ мог видеть скрипт, обойдём через updateLoader? Нет.
      // Сделаем так: админ видит скрипт, просто запрашивая /api/admin?action=getLoader или что-то.
      // Поэтому добавим новый action 'getLoader' в admin.js.
      // Пока используем хак: просто fetch без пароля не сработает из-за UA.
      // Мы же можем в браузере просто загрузить скрипт по ссылке? Но админ хочет видеть в textarea.
      // Быстрое решение: добавим в admin.js action 'getLoader', который отдаёт currentLoader без проверки UA.
    }

    // ВРЕМЕННО: загрузим скрипт через POST с action=getLoader (добавим в admin.js)
    async function loadLoader() {
      const res = await fetch('/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'getLoader', password: authPassword }),
      });
      const data = await res.json();
      if (data.loader) document.getElementById('loaderCode').value = data.loader;
    }

    document.getElementById('loadLoaderBtn').addEventListener('click', loadLoader);
    document.getElementById('updateLoaderBtn').addEventListener('click', async () => {
      const script = document.getElementById('loaderCode').value;
      const result = await apiPost({ action: 'updateLoader', loaderScript: script });
      document.getElementById('loaderStatus').innerHTML = result.success
        ? '<span class="text-green-400">Updated!</span>'
        : `<span class="text-red-400">${result.error}</span>`;
    });

    function renderGamesList(games) {
      const container = document.getElementById('gamesList');
      const entries = Object.entries(games);
      if (entries.length === 0) {
        container.innerHTML = '<p class="text-purple-400/50 text-center py-8">No games added yet</p>';
        return;
      }
      container.innerHTML = entries.map(([id, data]) => `
        <div class="bg-cyber-darker border border-purple-900/30 rounded-xl p-5">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div><label class="text-purple-300 text-xs">PlaceId</label><input type="text" class="w-full bg-cyber-dark border border-purple-900/50 rounded-lg px-3 py-2 text-sm" value="${id}" readonly /></div>
            <div><label class="text-purple-300 text-xs">Name</label><input type="text" class="game-name w-full bg-cyber-dark border border-purple-900/50 rounded-lg px-3 py-2 text-sm" value="${data.name || ''}" data-game="${id}" /></div>
            <div><label class="text-purple-300 text-xs">Status</label><select class="game-status w-full bg-cyber-dark border border-purple-900/50 rounded-lg px-3 py-2 text-sm" data-game="${id}">
              <option value="Undetected" ${data.status === 'Undetected' ? 'selected' : ''}>Undetected</option>
              <option value="On Update" ${data.status === 'On Update' ? 'selected' : ''}>On Update</option>
              <option value="Patched" ${data.status === 'Patched' ? 'selected' : ''}>Patched</option>
            </select></div>
          </div>
          <div class="flex gap-2">
            <button class="save-game bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg text-xs font-semibold" data-game="${id}">Save</button>
            <button class="delete-game bg-red-600/20 border border-red-500/30 text-red-400 hover:bg-red-600/40 px-4 py-2 rounded-lg text-xs font-semibold" data-game="${id}">Delete</button>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.save-game').forEach(btn => {
        btn.addEventListener('click', async () => {
          const game = btn.dataset.game;
          const name = document.querySelector(`.game-name[data-game="${game}"]`).value;
          const status = document.querySelector(`.game-status[data-game="${game}"]`).value;
          await apiPost({ action: 'updateGame', game, name, status });
          btn.textContent = 'Saved!'; btn.classList.add('!bg-green-600');
          setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('!bg-green-600'); }, 1500);
        });
      });

      document.querySelectorAll('.delete-game').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete?')) return;
          await apiPost({ action: 'deleteGame', game: btn.dataset.game });
          loadAllData();
        });
      });
    }

    document.getElementById('addGameBtn').addEventListener('click', async () => {
      const game = document.getElementById('newGameId').value.trim();
      const name = document.getElementById('newGameName').value.trim();
      const status = document.getElementById('newGameStatus').value;
      if (!game || !name) return alert('Fill all fields');
      await apiPost({ action: 'addGame', game, name, status });
      document.getElementById('newGameId').value = '';
      document.getElementById('newGameName').value = '';
      loadAllData();
    });

    function renderLogs(logs) {
      const tbody = document.getElementById('logsBody');
      if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-purple-400/50">No logs</td></tr>';
        return;
      }
      tbody.innerHTML = logs.slice(-50).reverse().map(l => `
        <tr class="border-b border-purple-900/20"><td class="py-3 px-4 text-sm">${new Date(l.timestamp).toLocaleString()}</td><td class="py-3 px-4 font-mono text-xs">${l.ip}</td><td class="py-3 px-4">${l.game}</td><td class="py-3 px-4">${l.gameName || ''}</td></tr>
      `).join('');
    }

    document.getElementById('refreshLogsBtn').addEventListener('click', async () => {
      const logs = await apiGet('logs');
      renderLogs(logs.launchLogs || []);
    });

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    // Дополним loadAllData вызовом loadLoader
    const originalLoadAllData = loadAllData;
    loadAllData = async function() {
      await originalLoadAllData();
      await loadLoader();
    };
  </script>
</body>
</html>
