<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalyst Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyber: { purple: '#a855f7', dark: '#0f0b1e', darker: '#07040f', neon: '#d946ef', pink: '#ec4899' },
          },
        },
      },
    };
  </script>
  <style>
    body { background: #07040f; }
    .gradient-text { background: linear-gradient(135deg, #d946ef, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tab-btn.active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #07040f; } ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #a855f7, #7c3aed); border-radius: 3px; }
  </style>
</head>
<body class="text-white font-sans min-h-screen p-6">
  <div class="max-w-6xl mx-auto">

    <!-- Заголовок + авторизация -->
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-bold gradient-text">Catalyst Admin Panel</h1>
        <p class="text-purple-400/50 text-sm mt-1">Games · Loader · Users · Logs</p>
      </div>
      <div class="flex gap-3">
        <input id="passwordInput" type="password" placeholder="Password" class="bg-cyber-dark border border-purple-900/50 rounded-lg px-4 py-2 text-white placeholder-purple-400/50 focus:outline-none focus:border-purple-500 w-44" />
        <button id="authBtn" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-lg font-semibold transition">Log In</button>
      </div>
    </div>

    <div id="authStatus" class="mb-6 text-sm"></div>

    <!-- Основной контент -->
    <div id="mainContent" class="hidden">

      <!-- Табы -->
      <div class="flex gap-2 mb-8 flex-wrap border-b border-purple-900/30 pb-4">
        <button class="tab-btn active px-5 py-2 rounded-lg text-sm font-medium border border-transparent transition" data-tab="tab-games">Games</button>
        <button class="tab-btn px-5 py-2 rounded-lg text-sm font-medium border border-transparent transition" data-tab="tab-loader">Universal Loader</button>
        <button class="tab-btn px-5 py-2 rounded-lg text-sm font-medium border border-transparent transition" data-tab="tab-users">Active Users</button>
        <button class="tab-btn px-5 py-2 rounded-lg text-sm font-medium border border-transparent transition" data-tab="tab-logs">Launch Logs</button>
        <button class="tab-btn px-5 py-2 rounded-lg text-sm font-medium border border-transparent transition" data-tab="tab-adminlogs">Admin Logs</button>
      </div>

      <!-- Таб: Games -->
      <div id="tab-games" class="tab-content active">
        <!-- ... (оставьте без изменений) ... -->
        <div class="bg-cyber-dark border border-purple-900/30 rounded-2xl p-6 mb-6">
          <h2 class="text-xl font-bold mb-4">Add New Game</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <input id="newGameId" placeholder="PlaceId" class="bg-cyber-darker border border-purple-900/50 rounded-lg px-4 py-2 text-sm"/>
            <input id="newGameName" placeholder="Name" class="bg-cyber-darker border border-purple-900/50 rounded-lg px-4 py-2 text-sm"/>
            <select id="newGameStatus" class="bg-cyber-darker border border-purple-900/50 rounded-lg px-4 py-2 text-sm">
              <option value="Undetected">Undetected</option>
              <option value="On Update">On Update</option>
              <option value="Patched">Patched</option>
            </select>
          </div>
          <button id="addGameBtn" class="bg-green-600 hover:bg-green-700 px-5 py-2 rounded-lg text-sm font-semibold transition">Add Game</button>
        </div>
        <div class="bg-cyber-dark border border-purple-900/30 rounded-2xl p-6">
          <h2 class="text-xl font-bold mb-4">Manage Games</h2>
          <div id="gamesList" class="space-y-4"></div>
        </div>
      </div>

      <!-- Таб: Universal Loader (оставьте без изменений) -->
      <div id="tab-loader" class="tab-content">
        <!-- ... ваш текущий код ... -->
      </div>

      <!-- Таб: Active Users -->
      <div id="tab-users" class="tab-content">
        <div class="bg-cyber-dark border border-purple-900/30 rounded-2xl p-6">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold">Active Users</h2>
            <div class="flex items-center gap-4">
              <span class="text-purple-300 text-sm">Online: <span id="onlineCount" class="text-green-400 font-bold text-lg">0</span></span>
              <button id="refreshUsersBtn" class="bg-cyber-darker border border-purple-900/50 hover:border-purple-500 px-4 py-2 rounded-lg text-sm transition">Refresh</button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-purple-900/30 text-purple-300">
                  <th class="py-3 px-4">User ID</th>
                  <th class="py-3 px-4">Place ID</th>
                  <th class="py-3 px-4">Game</th>
                  <th class="py-3 px-4">Rank</th>
                  <th class="py-3 px-4">Key Type</th>
                  <th class="py-3 px-4">Last Ping</th>
                </tr>
              </thead>
              <tbody id="usersBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Таб: Launch Logs (оставьте без изменений) -->
      <div id="tab-logs" class="tab-content">
        <!-- ... -->
      </div>

      <!-- Таб: Admin Logs (оставьте без изменений) -->
      <div id="tab-adminlogs" class="tab-content">
        <!-- ... -->
      </div>
    </div>
  </div>

  <script>
    // ========== АВТОРИЗАЦИЯ (без изменений) ==========
    let authPassword = '';
    const savedPass = sessionStorage.getItem('admin_pass');
    if (savedPass) { document.getElementById('passwordInput').value = savedPass; authenticate(savedPass); }

    document.getElementById('authBtn').addEventListener('click', () => {
      const pass = document.getElementById('passwordInput').value;
      if (!pass) return alert('Enter password');
      sessionStorage.setItem('admin_pass', pass);
      authenticate(pass);
    });

    document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('authBtn').click(); });

    async function authenticate(pass) {
      authPassword = pass;
      const res = await fetch(`/api/admin?action=logs&password=${encodeURIComponent(pass)}`);
      if (res.status === 401) {
        document.getElementById('authStatus').innerHTML = '<span class="text-red-400">Invalid password</span>';
        document.getElementById('mainContent').classList.add('hidden');
        return;
      }
      document.getElementById('authStatus').innerHTML = '<span class="text-green-400">Authenticated successfully</span>';
      document.getElementById('mainContent').classList.remove('hidden');
      await loadAllData();
    }

    // ========== API ==========
    async function apiGet(action, params = '') {
      const res = await fetch(`/api/admin?action=${action}&password=${encodeURIComponent(authPassword)}${params}`);
      return res.json();
    }

    async function apiPost(body) {
      const res = await fetch('/api/admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...body, password: authPassword }),
      });
      return res.json();
    }

    // ========== ЗАГРУЗКА ВСЕХ ДАННЫХ ==========
    async function loadAllData() {
      // ... ваш код загрузки игр, логов ...
      loadActiveUsers(); // Добавляем вызов
    }

    // ========== АКТИВНЫЕ ПОЛЬЗОВАТЕЛИ ==========
    async function loadActiveUsers() {
      try {
        const res = await fetch('/api/heartbeat?action=list');
        const data = await res.json();
        const users = data.users || [];
        document.getElementById('onlineCount').textContent = data.count || 0;

        const tbody = document.getElementById('usersBody');
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="py-8 px-4 text-center text-purple-400/50">No active users</td></tr>';
          return;
        }

        tbody.innerHTML = users.map(u => `
          <tr class="border-b border-purple-900/20 hover:bg-purple-900/10">
            <td class="py-3 px-4 font-mono text-xs">${u.userId}</td>
            <td class="py-3 px-4 text-sm">${u.placeId}</td>
            <td class="py-3 px-4 text-sm">${u.gameName}</td>
            <td class="py-3 px-4">
              <span class="px-2 py-0.5 rounded-full text-xs font-medium ${u.rank === 'Premium' || u.rank === 'Ultimate' ? 'bg-purple-600/30 text-purple-300' : 'bg-gray-600/30 text-gray-300'}">${u.rank}</span>
            </td>
            <td class="py-3 px-4 text-sm">${u.keyType}</td>
            <td class="py-3 px-4 text-xs text-purple-400">${new Date(u.lastPing).toLocaleTimeString()}</td>
          </tr>
        `).join('');
      } catch (e) {
        console.error('Failed to load active users:', e);
      }
    }

    document.getElementById('refreshUsersBtn')?.addEventListener('click', loadActiveUsers);
    // Автообновление каждые 30 секунд
    setInterval(loadActiveUsers, 30000);

    // ========== ТАБЫ (без изменений) ==========
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    // ========== ОСТАЛЬНЫЕ ОБРАБОТЧИКИ (Games, Loader, Logs) оставьте как есть ==========
    // ...
  </script>
</body>
</html>
